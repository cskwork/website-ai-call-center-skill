id: account
catalog_order: 20
scenario_intent: account_navigation
title: Account path
button_label: Find account settings
summary: Shows where account, settings, profile, and login help live.
utterances:
  - I cannot find account settings
  - Where is my profile page
  - I need login settings
match:
  keywords:
    - account
    - settings
    - profile
    - login
reply:
  text: I can point you to the account path and keep the action limited to a registered page target.
frontend_actions:
  - id: show-account
    label: Show account path
workflow:
  issue_type: product_navigation
  handoff: false
i18n:
  ko:
    title: 계정 찾기
    button_label: 계정 설정 찾기
    summary: 계정, 설정, 프로필, 로그인 도움말이 어디 있는지 안내합니다.
    utterances:
      - 계정 설정을 못 찾겠어요
      - 프로필 페이지가 어디예요
      - 로그인 설정이 필요해요
    reply:
      text: 계정 경로로 안내해 드릴게요. 등록된 페이지 영역으로만 동작을 제한합니다.
    frontend_actions:
      - id: show-account
        label: 계정 경로 보기
    match:
      keywords:
        - 계정
        - 설정
        - 프로필
        - 로그인
