id: ticket
catalog_order: 40
scenario_intent: escalation_ticket
title: Ticket draft
button_label: Draft ticket
summary: Creates an escalation draft with the captured issue, page path, and speech mode.
utterances:
  - I need to draft a technical support ticket
  - Please escalate this to an agent
  - Create a case for support
match:
  keywords:
    - ticket
    - case
    - agent
    - support
reply:
  text: I can draft a support ticket with the current page path and your issue summary.
frontend_actions:
  - id: draft-ticket
    label: Draft support ticket
workflow:
  issue_type: escalation
  handoff: true
i18n:
  ko:
    title: 티켓 작성
    button_label: 티켓 작성
    summary: 수집된 문제, 페이지 경로, 음성 모드로 에스컬레이션 초안을 만듭니다.
    utterances:
      - 기술 지원 티켓을 작성하고 싶어요
      - 상담원에게 에스컬레이션해 주세요
      - 지원 케이스를 만들어 주세요
    reply:
      text: 현재 페이지 경로와 문제 요약으로 지원 티켓 초안을 작성해 드릴게요.
    frontend_actions:
      - id: draft-ticket
        label: 지원 티켓 작성
    match:
      keywords:
        - 티켓
        - 케이스
        - 상담원
        - 지원
        - 에스컬
